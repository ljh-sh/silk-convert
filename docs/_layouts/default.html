<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.6;
      color: #24292e;
    }
    h1, h2, h3, h4, h5, h6 { font-weight: 600; }
    h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
    h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.2em; margin-top: 1.5em; }
    pre, code { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
    pre { padding: 1em; background: #f6f8fa; border-radius: 6px; overflow-x: auto; }
    code { background: rgba(27,31,35,0.05); padding: 0.2em 0.4em; border-radius: 3px; font-size: 90%; }
    pre code { background: none; padding: 0; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { border-collapse: collapse; margin: 1em 0; }
    th, td { padding: 6px 13px; border: 1px solid #dfe2e5; }
    th { background: #f6f8fa; }
    nav { padding: 1em 0; border-bottom: 1px solid #eaecef; margin-bottom: 1em; }
    nav a { margin-right: 1em; }
    blockquote { padding: 0 1em; color: #6a737d; border-left: 0.25em solid #dfe2e5; margin: 1em 0; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/install' | relative_url }}">Install</a>
    <a href="{{ '/usage' | relative_url }}">Usage</a>
    <a href="{{ '/formats' | relative_url }}">Formats</a>
    <a href="{{ '/faq' | relative_url }}">FAQ</a>
    <a href="https://github.com/ljh-sh/silk">GitHub</a>
  </nav>
  {{ content }}
</body>
</html>

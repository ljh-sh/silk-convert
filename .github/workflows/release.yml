name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: silk
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: silk
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: silk
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: silk.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          strip staging/${{ matrix.binary }} 2>/dev/null || true
          tar -C staging -czf silk-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          rm -rf staging

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.binary }} -DestinationPath silk-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: silk-${{ matrix.target }}
          path: |
            silk-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            silk-${{ github.ref_name }}-${{ matrix.target }}.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} flat/ \;
          ls -la flat/

      - name: Generate checksums
        working-directory: flat
        run: |
          sha256sum silk-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            flat/silk-*
            flat/SHA256SUMS

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions: read-all

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: silk
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: silk
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: silk
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: silk
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: silk.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          strip staging/${{ matrix.binary }} 2>/dev/null || true
          tar -C staging -cJf silk-${{ github.ref_name }}-${{ matrix.target }}.tar.xz ${{ matrix.binary }}
          rm -rf staging

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          tar -C staging -cJf silk-${{ github.ref_name }}-${{ matrix.target }}.tar.xz ${{ matrix.binary }}
          rm -rf staging

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: silk-${{ matrix.target }}
          path: |
            silk-${{ github.ref_name }}-${{ matrix.target }}.tar.xz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p flat
          find artifacts -type f \( -name '*.tar.xz' -o -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} flat/ \;
          ls -la flat/

      - name: Generate checksums
        working-directory: flat
        run: |
          sha256sum silk-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            flat/silk-*
            flat/SHA256SUMS

      - name: Sign artifacts with sigstore
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # main
        with:
          cosign-release: 'v2.4.1'

      - name: Sign with cosign keyless
        working-directory: flat
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          for f in silk-*; do
            cosign sign-blob --output-signature "$f.sig" --bundle "$f.bundle" --yes "$f"
          done

      - name: Attach signatures to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            flat/silk-*.sig
